name: Deploy

on:
  push:
    branches: [main]

permissions:
  id-token: write   # Required for OIDC token request
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Log in to ECR
        id: ecr-login
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push image
        env:
          ECR_URL: ${{ steps.ecr-login.outputs.registry }}/${{ secrets.ECR_REPOSITORY }}
        run: |
          docker build --platform linux/arm64 -t $ECR_URL:latest .
          docker push $ECR_URL:latest

      - name: Restart app on EC2
        run: |
          COMMAND_ID=$(aws ssm send-command \
            --region ${{ secrets.AWS_REGION }} \
            --instance-ids ${{ secrets.EC2_INSTANCE_ID }} \
            --document-name "AWS-RunShellScript" \
            --parameters 'commands=[
              "aws ecr get-login-password --region ${{ secrets.AWS_REGION }} | docker login --username AWS --password-stdin ${{ secrets.ECR_URL }}",
              "docker pull ${{ secrets.ECR_URL }}:latest",
              "docker stop portfolio-app || true",
              "docker rm portfolio-app || true",
              "docker run -d --name portfolio-app --restart unless-stopped -p ${{ secrets.APP_PORT }}:${{ secrets.APP_PORT }} -v /home/ec2-user/data:/data ${{ secrets.ECR_URL }}:latest"
            ]' \
            --query "Command.CommandId" \
            --output text)

          # Wait for the command to complete and surface any errors
          aws ssm wait command-executed \
            --command-id $COMMAND_ID \
            --instance-id ${{ secrets.EC2_INSTANCE_ID }}

          aws ssm get-command-invocation \
            --command-id $COMMAND_ID \
            --instance-id ${{ secrets.EC2_INSTANCE_ID }} \
            --query "StandardOutputContent" \
            --output text
